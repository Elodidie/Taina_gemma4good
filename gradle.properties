# Project-wide Gradle settings

# JVM heap ? bump this up because the MediaPipe .bin is large and
# Gradle needs headroom during dependency resolution
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Use the new Kotlin/Android build pipeline
android.useAndroidX=true

# Enables Compose compiler metrics (optional, safe to keep)
android.enableJetifier=false

# Parallel builds
org.gradle.parallel=true

# Build cache
org.gradle.caching=true

# Kotlin code style
kotlin.code.style=official